name: CI

on:
  push:
    branches: [main, master, "claude/*"]
  pull_request:
    branches: [main, master]

permissions:
  contents: read

jobs:
  # ─── Type checking ─────────────────────────────────────────────────────────
  typecheck:
    name: Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install backend dependencies
        run: npm ci

      - name: Type-check backend
        run: npx tsc --noEmit

      - name: Install frontend dependencies
        run: cd site && npm ci

      - name: Type-check frontend
        run: cd site && npx tsc --noEmit

  # ─── Backend unit + integration tests ─────────────────────────────────────
  test-backend:
    name: Backend Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run backend tests
        run: npm test
        env:
          DATABASE_URL: ":memory:"
          NODE_ENV: test
          JWT_SECRET: "ci-test-secret-that-is-long-enough-64chars-padding"
          REDIS_URL: "redis://localhost:6379"

  # ─── Frontend component tests ──────────────────────────────────────────────
  test-frontend:
    name: Frontend Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install frontend dependencies
        run: cd site && npm ci

      - name: Run frontend tests
        run: cd site && npm test

  # ─── Build verification ────────────────────────────────────────────────────
  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [typecheck, test-backend, test-frontend]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install all dependencies
        run: npm ci && cd site && npm ci

      - name: Build backend + frontend
        run: npm run build:all

      - name: Verify dist output
        run: |
          test -f dist/server/app.js || (echo "Backend build missing dist/server/app.js" && exit 1)
          test -f site/dist/index.html || (echo "Frontend build missing site/dist/index.html" && exit 1)
          echo "Build artifacts verified ✓"
